<div class="relative">
  <div class="absolute left-0 right-0 top-6 hidden h-px bg-gradient-to-r from-purple-500/60 via-purple-500/30 to-purple-500/60 md:block" aria-hidden="true"></div>

  <div class="grid gap-4 md:grid-cols-5 md:gap-3">
    @for (item of items(); track item.year) {
      <article class="relative flex h-full flex-col gap-4 rounded-2xl border border-white/60 bg-white/70 p-4 shadow-[0_10px_30px_rgba(15,23,42,0.08)] backdrop-blur-md dark:border-white/10 dark:bg-slate-900/40 dark:shadow-[0_12px_30px_rgba(2,6,23,0.28)]">
        <div class="flex items-center gap-3 md:flex-col md:items-start md:gap-4">
          <span class="relative flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-purple-600 shadow-[0_0_0_6px_rgba(168,85,247,0.14)] dark:bg-purple-400 dark:shadow-[0_0_0_6px_rgba(196,181,253,0.12)]" aria-hidden="true">
            <span class="h-2.5 w-2.5 rounded-full bg-white dark:bg-slate-950"></span>
          </span>
          <div>
            <p class="text-sm font-semibold text-slate-950 dark:text-white">{{ item.year }}</p>
            <p class="text-xs uppercase tracking-[0.22em] text-purple-700 dark:text-purple-400">Milestone</p>
          </div>
        </div>

        <div class="space-y-1">
          <h3 class="text-sm font-semibold text-slate-950 dark:text-white">{{ item.title }}</h3>
          <p class="text-sm leading-6 text-slate-600 dark:text-slate-400">{{ item.subtitle }}</p>
        </div>
      </article>
    }
  </div>
</div>
