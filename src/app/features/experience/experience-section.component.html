<section
  id="experience"
  aria-labelledby="experience-heading"
  class="w-full bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-100 app-section px-6 sm:px-12 md:px-20 lg:max-w-none lg:pl-24 lg:pr-24"
>
  <div class="w-full max-w-5xl">
    <header class="mb-12">
      <p class="text-xs font-semibold uppercase tracking-[0.35em] text-purple-600 dark:text-purple-400">{{ 'Career Path' | translate }}</p>
      <h2 id="experience-heading" class="mt-2 text-3xl font-bold tracking-tight text-slate-950 dark:!text-white sm:text-4xl">
        {{ sectionHeading | translate }}
      </h2>
      <div class="h-[3px] w-16 bg-purple-600 dark:bg-purple-400 mt-2 mb-12" aria-hidden="true"></div>
    </header>

    <div class="relative">
      <div class="absolute left-[11px] top-3 bottom-3 w-[2px] bg-slate-200 dark:bg-slate-800" aria-hidden="true"></div>

      <div class="space-y-10 md:space-y-6">
        @for (item of workHistory; track item.company) {
          <article class="relative block md:flex md:items-start md:gap-6 w-full">
            
            <div class="flex items-center gap-4 h-6 md:h-auto md:pt-[26px] shrink-0">
              <div class="h-6 w-6 rounded-full border-4 border-purple-600 bg-white dark:bg-slate-950 shadow-lg shadow-purple-500/20 shrink-0 z-10 flex items-center justify-center">
                <div class="w-1.5 h-1.5 rounded-full bg-purple-600 dark:bg-purple-400" aria-hidden="true"></div>
              </div>

              <div class="text-xs sm:text-sm font-bold md:font-medium tracking-wide text-purple-600 md:text-slate-500 dark:text-purple-400 md:dark:text-slate-500 select-none md:min-w-[110px]">
                {{ item.dateRange | translate }}
              </div>
            </div>

            <div class="pl-10 md:pl-0 mt-3 md:mt-0 flex-1 w-full">
              <div class="w-full rounded-3xl border border-slate-200/60 bg-white/80 p-6 shadow-sm backdrop-blur-sm dark:border-slate-900/40 dark:bg-slate-900/20 transition-all duration-300 hover:border-purple-500/20 dark:hover:border-purple-500/20">
                
                <h3 class="text-base sm:text-lg font-bold text-slate-950 dark:!text-white tracking-tight leading-tight">
                  {{ item.roleTitle | translate }}
                </h3>

                <p class="mt-0.5 text-xs sm:text-sm text-purple-600 dark:text-purple-400 font-semibold tracking-wide">
                  {{ item.company }}
                </p>

                <p class="mt-3 text-xs sm:text-sm leading-relaxed text-slate-500 dark:text-slate-400 font-normal max-w-3xl">
                  {{ item.description | translate }}
                </p>

                <div class="mt-4 flex flex-wrap gap-2">
                  @for (tag of item.tags; track tag) {
                    <span class="rounded-xl border border-slate-200/80 bg-slate-50/40 px-3 py-1.5 text-[11px] font-medium text-slate-500 dark:border-slate-800/80 dark:bg-slate-950/40 dark:text-slate-400 select-none">
                      {{ tag }}
                    </span>
                  }
                </div>
                
              </div>
            </div>

          </article>
        }
      </div>
    </div>
  </div>
</section>
