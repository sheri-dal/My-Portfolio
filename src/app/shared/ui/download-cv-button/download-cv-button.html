<a
  class="inline-flex items-center gap-2 rounded-lg border border-purple-600/30 px-4 py-2 text-sm font-medium text-purple-600 transition-all duration-200 hover:-translate-y-0.5 hover:bg-purple-600 hover:text-white hover:shadow-[0_0_0_1px_rgba(168,85,247,0.12),0_0_22px_rgba(168,85,247,0.25)] focus:outline-none focus-visible:ring-2 focus-visible:ring-purple-500/60 dark:border-purple-400/30 dark:text-purple-400 dark:hover:bg-purple-400 dark:hover:text-slate-950"
  [class.w-full]="fullWidth()"
  [class.justify-center]="fullWidth()"
  [href]="href()"
  [attr.download]="fileName()"
>
  <span nz-icon nzType="download" nzTheme="outline" class="text-[0.95rem]" aria-hidden="true"></span>
  {{ label() | translate }}
</a>
