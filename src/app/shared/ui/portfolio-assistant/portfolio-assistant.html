<div class="assistant-root">
  @if (isOpen()) {
    <section class="assistant-panel" role="dialog" aria-modal="false" aria-labelledby="assistant-title">
      <header class="assistant-header">
        <div class="assistant-avatar" aria-hidden="true">SH</div>
        <div>
          <h2 id="assistant-title">Portfolio Assistant</h2>
          <p><span class="status-dot"></span> Online • Instant answers</p>
        </div>
        <button type="button" class="icon-button" aria-label="Close portfolio assistant" (click)="close()">×</button>
      </header>

      <div class="messages" aria-live="polite">
        @for (message of messages(); track $index) {
          <div class="message" [class.visitor]="message.sender === 'visitor'">
            {{ message.text }}
          </div>
        }
      </div>

      <div class="quick-questions" aria-label="Suggested questions">
        @for (question of quickQuestions; track question.label) {
          <button type="button" (click)="ask(question.prompt)">{{ question.label }}</button>
        }
      </div>

      <form class="composer" (ngSubmit)="submit()">
        <label class="sr-only" for="assistant-message">Ask a question</label>
        <input
          id="assistant-message"
          name="assistant-message"
          type="text"
          autocomplete="off"
          placeholder="Ask about skills or projects..."
          [ngModel]="draft()"
          (ngModelChange)="draft.set($event)"
        />
        <button type="submit" [disabled]="!draft().trim()" aria-label="Send question">
          <span aria-hidden="true">→</span>
        </button>
      </form>

      <a
        class="whatsapp-action"
        [href]="whatsappUrl()"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Continue conversation with Sheheryar on WhatsApp"
      >
        <svg viewBox="0 0 32 32" aria-hidden="true">
          <path d="M16 3a13 13 0 0 0-11.1 19.8L3 29l6.4-1.8A13 13 0 1 0 16 3Zm0 23.6c-2 0-4-.6-5.7-1.6l-.4-.2-3.8 1 1-3.7-.2-.4A10.6 10.6 0 1 1 16 26.6Zm5.8-7.9c-.3-.2-1.9-1-2.2-1.1-.3-.1-.5-.2-.8.2-.2.3-.8 1.1-1 1.3-.2.2-.4.2-.7.1-2-.8-3.4-2-4.5-3.9-.3-.5.3-.5.9-1.6.1-.2.1-.5 0-.7l-1-2.5c-.3-.6-.5-.5-.8-.5h-.7c-.2 0-.6.1-1 .5-1 1-1.5 2.2-1.4 3.5.1 2 1.4 3.9 1.6 4.1.2.3 2.8 4.3 6.8 6 2.6 1.1 3.7 1.2 5 .9.8-.1 1.9-.8 2.2-1.6.3-.8.3-1.5.2-1.6-.1-.2-.3-.3-.6-.5Z"/>
        </svg>
        Continue on WhatsApp
      </a>

      <p class="privacy-note">Automated answers • No chat data is stored</p>
    </section>
  }

  <button
    type="button"
    class="assistant-trigger"
    [class.open]="isOpen()"
    [attr.aria-expanded]="isOpen()"
    aria-label="Open portfolio assistant"
    (click)="toggle()"
  >
    @if (isOpen()) {
      <span aria-hidden="true">×</span>
    } @else {
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H9l-5 4v-4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm3 5h10V7H7v2Zm0 4h7v-2H7v2Z"/>
      </svg>
      <span class="trigger-label">Ask me</span>
    }
  </button>
</div>
